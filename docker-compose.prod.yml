version: "3.9"

networks:
  orbital-prod-net:
    name: orbital-prod-net
    driver: bridge
  n8n_default:
    external: true

volumes:
  orbital-pgdata-prod:
    name: orbital-pgdata-prod

services:
  db:
    image: kartoza/postgis:16-3.4
    container_name: orbital-prod-db
    restart: unless-stopped
    networks:
      - orbital-prod-net
    volumes:
      - orbital-pgdata-prod:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orbital}
      POSTGRES_USER: ${POSTGRES_USER:-orbital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_MULTIPLE_EXTENSIONS: postgis,postgis_topology
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-orbital} -d $${POSTGRES_DB:-orbital}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: orbital-prod-api
    restart: unless-stopped
    networks:
      - orbital-prod-net
    ports:
      - "127.0.0.1:8200:8200"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbital}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-orbital}
      API_HOST: "0.0.0.0"
      API_PORT: "8200"
      FRONTEND_ORIGIN: "https://geo.fahadbilal.com"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: orbital-prod-web
    restart: unless-stopped
    networks:
      - orbital-prod-net
      - n8n_default
    ports:
      - "127.0.0.1:8201:80"
    depends_on:
      - api
