name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: orbital
          POSTGRES_PASSWORD: orbital
          POSTGRES_DB: orbital_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest httpx ruff

      - name: Lint
        run: ruff check api/

      - name: Load schema and seed
        env:
          PGPASSWORD: orbital
        run: |
          psql -h localhost -U orbital -d orbital_test -f db/init.sql
          psql -h localhost -U orbital -d orbital_test -f db/seed.sql

      - name: Run tests
        working-directory: api
        env:
          DATABASE_URL: postgresql://orbital:orbital@localhost:5432/orbital_test
        run: pytest tests/ -v

  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npx tsc -b --noEmit

      - name: Build
        working-directory: web
        run: npm run build
